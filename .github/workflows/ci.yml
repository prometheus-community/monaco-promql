---
name: CI

on:
  pull_request:
  push:
    branches:
      - '**'
  release:
    types: [published]

permissions:
  id-token: write  # Required for OIDC trusted publishing
  contents: read

jobs:
  build:
    name: Build library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Upload library artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: lib
          path: lib
          if-no-files-found: error

  lint:
    name: Lint library
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ github.event_name != 'release' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

  publish:
    name: Publish library to npm
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ github.event_name == 'release' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (OIDC trusted publishing requires npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Download library artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: lib
          path: lib

      - name: Prepare package metadata
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          cp README.md lib/README.md
          cp package.json lib/package.json
          cd lib
          npm version --no-git-tag-version "${RELEASE_TAG}"

      - name: Publish
        # Use GitHub's "pre-release" checkbox to decide the dist-tag:
        # pre-releases go to "next" so they never become "latest".
        run: |
          DIST_TAG=${{ github.event.release.prerelease && 'next' || 'latest' }}
          npm publish ./lib --access public --tag "${DIST_TAG}"
